name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Check environment
        run: |
          echo "Node version:"
          node --version
          echo "NPM version:"
          npm --version
          echo "Current directory:"
          pwd
          echo "Directory contents:"
          ls -la
      
      - name: Install Rust
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 https://sh.rustup.rs -sSf | sh -s -- -y --default-toolchain stable
          source $HOME/.cargo/env
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          cargo --version
          rustc --version
      
      - name: Install dependencies
        run: |
          npm ci
          echo "Dependencies installed"
          ls -la node_modules/.bin/tauri 2>/dev/null || echo "Tauri not in node_modules/.bin"
      
      - name: Build Tauri app (verbose)
        shell: bash
        run: |
          source $HOME/.cargo/env
          echo "Starting Tauri build..."
          npm run tauri build -- --verbose 2>&1 | tee build.log || true
          echo "Build completed or failed, checking results..."
          ls -la src-tauri/target/release/ 2>/dev/null || echo "No release directory found"
          ls -la src-tauri/target/release/bundle/ 2>/dev/null || echo "No bundle directory found"
      
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-build-log
          path: build.log
      
      - name: Upload binary if exists
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-binary
          path: src-tauri/target/release/openego
          if-no-files-found: ignore
