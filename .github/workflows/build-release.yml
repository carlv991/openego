name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Rust
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 https://sh.rustup.rs -sSf | sh -s -- -y --default-toolchain stable
          source $HOME/.cargo/env
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          cargo --version
      
      - name: Install Dependencies
        run: npm ci
      
      - name: Build Tauri App
        shell: bash
        run: |
          source $HOME/.cargo/env
          npm run tauri build 2>&1 | tee build.log
        continue-on-error: true
      
      - name: Debug Output
        run: |
          echo "=== Build Log Last 50 Lines ==="
          tail -50 build.log 2>/dev/null || echo "No build log"
          echo ""
          echo "=== Release Directory ==="
          ls -la src-tauri/target/release/ 2>/dev/null || echo "No release dir"
          echo ""
          echo "=== Looking for Binary ==="
          find src-tauri/target -name "openego" -type f 2>/dev/null | head -5 || echo "Binary not found"
      
      - name: Upload Binary if Exists
        if: hashFiles('src-tauri/target/release/openego') != ''
        uses: actions/upload-artifact@v4
        with:
          name: openego-macos
          path: src-tauri/target/release/openego
      
      - name: Create Release
        if: hashFiles('src-tauri/target/release/openego') != ''
        uses: softprops/action-gh-release@v1
        with:
          files: src-tauri/target/release/openego
          name: "OpenEgo v0.1.0"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Fail if Binary Not Found
        if: hashFiles('src-tauri/target/release/openego') == ''
        run: |
          echo "ERROR: Binary not built!"
          exit 1
