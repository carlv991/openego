name: Build Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Setup Rust
        uses: dtolnay/rust-action@stable
      
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf
      
      - name: Install npm deps
        run: npm install
      
      - name: Build
        run: npm run tauri build
      
      - name: Package
        run: |
          cd src-tauri/target/release
          tar -czf openego-linux-x86_64.tar.gz openego
          mv openego-linux-x86_64.tar.gz ../../../
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: openego-linux-*.tar.gz

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Setup Rust
        uses: dtolnay/rust-action@stable
      
      - name: Install npm deps
        run: npm install
      
      - name: Build Intel
        run: npm run tauri build -- --target x86_64-apple-darwin
      
      - name: Build ARM
        run: npm run tauri build -- --target aarch64-apple-darwin
      
      - name: Package Intel
        run: |
          cd src-tauri/target/x86_64-apple-darwin/release
          tar -czf openego-macos-x86_64.tar.gz openego
          mv openego-macos-x86_64.tar.gz ../../../
      
      - name: Package ARM
        run: |
          cd src-tauri/target/aarch64-apple-darwin/release
          tar -czf openego-macos-aarch64.tar.gz openego
          mv openego-macos-aarch64.tar.gz ../../../
      
      - name: Upload Intel
        uses: actions/upload-artifact@v4
        with:
          name: macos-intel
          path: openego-macos-x86_64.tar.gz
      
      - name: Upload ARM
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm
          path: openego-macos-aarch64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Setup Rust
        uses: dtolnay/rust-action@stable
      
      - name: Install npm deps
        run: npm install
      
      - name: Build
        run: npm run tauri build
      
      - name: Package
        run: |
          cd src-tauri/target/release
          7z a openego-windows-x86_64.zip openego.exe
          mv openego-windows-x86_64.zip ../../..
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: openego-windows-*.zip

  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all
        uses: actions/download-artifact@v4
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: '**/*'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
