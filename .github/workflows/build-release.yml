name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build for Linux
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu]
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf
      
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Install dependencies
        run: npm install
      
      - name: Build Tauri
        run: npm run tauri build -- --target ${{ matrix.target }}
      
      - name: Package binary
        run: |
          cd src-tauri/target/${{ matrix.target }}/release
          tar -czf openego-linux-x86_64.tar.gz openego
          mv openego-linux-*.tar.gz ../../../..
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openego-linux-x86_64
          path: openego-linux-*.tar.gz

  # Build for macOS
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin
      
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Install dependencies
        run: npm install
      
      - name: Build for Intel Mac
        run: npm run tauri build -- --target x86_64-apple-darwin
      
      - name: Build for Apple Silicon
        run: npm run tauri build -- --target aarch64-apple-darwin
      
      - name: Package Intel binary
        run: |
          cd src-tauri/target/x86_64-apple-darwin/release
          tar -czf openego-macos-x86_64.tar.gz openego
          mv openego-macos-*.tar.gz ../../../..
      
      - name: Package ARM binary
        run: |
          cd src-tauri/target/aarch64-apple-darwin/release
          tar -czf openego-macos-aarch64.tar.gz openego
          mv openego-macos-*.tar.gz ../../../..
      
      - name: Upload Intel artifact
        uses: actions/upload-artifact@v4
        with:
          name: openego-macos-x86_64
          path: openego-macos-x86_64.tar.gz
      
      - name: Upload ARM artifact
        uses: actions/upload-artifact@v4
        with:
          name: openego-macos-aarch64
          path: openego-macos-aarch64.tar.gz

  # Build for Windows
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-action@stable
      
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Install dependencies
        run: npm install
      
      - name: Build Tauri
        run: npm run tauri build
      
      - name: Package binary
        run: |
          cd src-tauri/target/release
          7z a openego-windows-x86_64.zip openego.exe
          mv openego-windows-x86_64.zip ../../..
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openego-windows-x86_64
          path: openego-windows-*.zip

  # Create GitHub Release
  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
