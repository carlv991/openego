name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Rust
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 https://sh.rustup.rs -sSf | sh -s -- -y --default-toolchain stable
          source $HOME/.cargo/env
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build Tauri app
        shell: bash
        run: |
          source $HOME/.cargo/env
          npm run tauri build
      
      - name: Debug - List build outputs
        run: |
          echo "=== Release directory ==="
          ls -la src-tauri/target/release/ || echo "No release dir"
          echo ""
          echo "=== Bundle directory ==="
          ls -la src-tauri/target/release/bundle/ || echo "No bundle dir"
          echo ""
          echo "=== macOS app bundle ==="
          ls -la src-tauri/target/release/bundle/macos/ || echo "No macos dir"
          echo ""
          echo "=== DMG files ==="
          ls -la src-tauri/target/release/bundle/dmg/ || echo "No dmg dir"
          find src-tauri/target/release/bundle -type f -name "*.app" 2>/dev/null || echo "No .app found"
          find src-tauri/target/release/bundle -type f -name "*.dmg" 2>/dev/null || echo "No .dmg found"
      
      - name: Upload all artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build-files
          path: |
            src-tauri/target/release/bundle/**/*
            src-tauri/target/release/openego
          if-no-files-found: warn
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            src-tauri/target/release/bundle/**/*
            src-tauri/target/release/openego
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
