name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Rust
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 https://sh.rustup.rs -sSf | sh -s -- -y --default-toolchain stable
          source $HOME/.cargo/env
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      
      - name: Install Dependencies
        run: npm ci
      
      - name: Build Tauri App
        shell: bash
        run: |
          source $HOME/.cargo/env
          npm run tauri build
      
      - name: Find Binary
        id: find-binary
        run: |
          echo "Looking for binary..."
          find src-tauri/target -name "openego" -type f -executable 2>/dev/null | head -5
          find src-tauri/target -name "OpenEgo" -type f 2>/dev/null | head -5
          ls -la src-tauri/target/release/ 2>/dev/null || true
          
          # Check for binary
          if [ -f "src-tauri/target/release/openego" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "path=src-tauri/target/release/openego" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Upload Binary
        if: steps.find-binary.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: openego-macos-binary
          path: src-tauri/target/release/openego
      
      - name: Create Release
        if: steps.find-binary.outputs.found == 'true'
        uses: softprops/action-gh-release@v1
        with:
          files: src-tauri/target/release/openego
          name: "OpenEgo v0.1.0"
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
