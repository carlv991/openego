name: Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-action@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install npm deps
        run: npm install

      - name: build
        run: npm run tauri build ${{ matrix.args }}

      - name: upload linux
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: openego-linux
          path: src-tauri/target/release/openego

      - name: upload macos
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: openego-macos
          path: src-tauri/target/aarch64-apple-darwin/release/openego

      - name: upload windows
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: openego-windows
          path: src-tauri/target/release/openego.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      
      - name: package
        run: |
          tar -czf openego-linux-x86_64.tar.gz openego-linux/openego
          tar -czf openego-macos-aarch64.tar.gz openego-macos/openego
          zip openego-windows-x86_64.zip openego-windows/openego.exe
      
      - name: release
        uses: softprops/action-gh-release@v1
        with:
          files: '*.tar.gz,*.zip'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
