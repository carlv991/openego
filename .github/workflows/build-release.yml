name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Check Environment
        run: |
          echo "Node: $(node --version)"
          echo "NPM: $(npm --version)"
          echo "PWD: $(pwd)"
          ls -la
      
      - name: Install Rust
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 https://sh.rustup.rs -sSf | sh -s -- -y --default-toolchain stable
          source $HOME/.cargo/env
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          cargo --version
          rustc --version
      
      - name: Install Dependencies
        run: |
          npm ci
          echo "Tauri CLI location:"
          ls -la node_modules/.bin/tauri 2>/dev/null || echo "Not in node_modules/.bin"
          npx tauri --version || echo "Tauri CLI not found via npx"
      
      - name: Build with Verbose Logging
        shell: bash
        run: |
          source $HOME/.cargo/env
          echo "Starting Tauri build..."
          npm run tauri build -- --verbose 2>&1 | tee build.log || EXIT_CODE=$?
          echo "Build exit code: ${EXIT_CODE:-0}"
          exit ${EXIT_CODE:-0}
        continue-on-error: true
      
      - name: Debug - Check Build Outputs
        run: |
          echo "=== Current Directory ==="
          pwd
          echo ""
          echo "=== Src-Tauri Structure ==="
          ls -la src-tauri/
          echo ""
          echo "=== Target Directory ==="
          ls -la src-tauri/target/ 2>/dev/null || echo "No target dir"
          echo ""
          echo "=== Release Directory ==="
          ls -la src-tauri/target/release/ 2>/dev/null || echo "No release dir"
          echo ""
          echo "=== Bundle Directory ==="
          ls -laR src-tauri/target/release/bundle/ 2>/dev/null || echo "No bundle dir"
          echo ""
          echo "=== Build Log Tail ==="
          tail -100 build.log 2>/dev/null || echo "No build.log"
      
      - name: Upload Debug Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-output
          path: |
            build.log
            src-tauri/target/release/build/**/output
            src-tauri/target/release/build/**/stderr
      
      - name: Upload Binary if Exists
        if: success() && hashFiles('src-tauri/target/release/openego') != ''
        uses: actions/upload-artifact@v4
        with:
          name: openego-macos
          path: src-tauri/target/release/openego
      
      - name: Create Release
        if: success() && hashFiles('src-tauri/target/release/openego') != ''
        uses: softprops/action-gh-release@v1
        with:
          files: src-tauri/target/release/openego
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
